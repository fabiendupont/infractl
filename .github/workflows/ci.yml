name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test $(go list ./... | grep -v /tests/) -count=1

  integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Integration and e2e tests
        run: go test ./tests/integration/ ./tests/e2e/ -v -count=1
        timeout-minutes: 15
